name: 📊 Generar Informe Diario de Mercado

on:
  schedule:
    - cron: '0 11 * * 1-5'
    - cron: '0 22 * * 1-5'
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install @anthropic-ai/sdk node-fetch

      - name: Generate report
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node generate.js

      - name: Commit and push
        run: |
          git config user.name "Market Terminal Bot"
          git config user.email "bot@market-terminal"
          git add informe-mercado-*.html index.html
          git diff --staged --quiet || git commit -m "📊 Informe $(date +'%d-%b-%Y %H:%M') AR generado"
          git pull --rebase origin main
          git push
